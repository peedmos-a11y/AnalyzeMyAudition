<!DOCTYPE html>
<html>
<head>
<title>🎭 Audition Analyzer</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
<h1>🎭 Audition Analyzer</h1>
<p>Record or upload your audition and find your best role!</p>

<div class="recorder">
<h2>🎥 Record Your Audition:</h2>
<video id="preview" width="300" autoplay muted></video><br>
<button id="startRec">Start Recording</button>
<button id="stopRec" disabled>Stop Recording</button>
</div>

<div class="upload">
<h2>📁 Or Upload a File:</h2>
<form id="uploadForm">
<input type="file" id="fileInput" accept=".mp4,.webm,.mp3,.wav"><br><br>
<label>Select Musical:</label><br>
<select id="showSelect">
<option>Wicked</option>
<option>Hamilton</option>
<option>Les Misérables</option>
</select><br><br>
<button type="submit">Analyze My Audition</button>
</form>
</div>

<div id="results"></div>
</div>
<script src="script.js"></script>
</body>
</html>
